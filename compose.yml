# docker compose up --build -d  でビルド開始
# docker logs -f Docker_Yocto    で進捗確認
# docker compose down            でコンテナ削除

services:
  yocto:
    env_file: .env
    cpus: ${CPU_CORE}

    container_name: ${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}

    build:
      context: ${Dockerfile_DIR}
      dockerfile: ${Dockerfile}
      args:
        WS:          ${WS}
        ENTRY_DIR:   ${ENTRY_DIR}
        ENTRY_POINT: ${ENTRY_POINT}

    volumes:
      - ${VOLUME}:/${WS}   # ホスト ./build → コンテナ内 /build

    privileged: true        # mount / losetup に必須
    security_opt:
      - apparmor:unconfined    # Ubuntu24.04のAppArmorによるuser namespace制限を回避
    userns_mode: host          # ホストのuser namespaceを使用
    pid: host

    restart: no             # ビルド完了後に自動再起動しない
    stop_grace_period: 24h  # Yoctoは長時間ビルドになるため余裕を持たせる

    environment:
      # ── ビルド設定 ──
      - YOCTO_RELEASE=${YOCTO_RELEASE}
      - DEVICE_PROFILE=${DEVICE_PROFILE}
      - MACHINE=${MACHINE}
      - IMAGE=${IMAGE}
      - WS=${WS}
      - CPU_CORE=${CPU_CORE}
      - EXTRA_PACKAGES=${EXTRA_PACKAGES}
      # ── ネットワーク設定 ──
      - NETWORK_PROTO=${NETWORK_PROTO}
      - STATIC_IP=${STATIC_IP}
      - STATIC_NETMASK=${STATIC_NETMASK}
      - STATIC_GATEWAY=${STATIC_GATEWAY}
      - STATIC_DNS=${STATIC_DNS}
      # ── ロケール・タイムゾーン ──
      - TIME_ZONE=${TIME_ZONE}
      - LOCALE=${LOCALE}
      # ── SSH ──
      - ENABLE_SSH=${ENABLE_SSH}
      - SSH_PORT=${SSH_PORT}
      # ── 認証 ──
      - ROOT_PASSWORD=${ROOT_PASSWORD}
      # ── systemd ──
      - USE_SYSTEMD=${USE_SYSTEMD}

    command:
      - /${ENTRY_DIR}/${ENTRY_POINT}
